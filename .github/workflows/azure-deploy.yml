name: Build and Deploy to Azure

on:
  push:
    branches:
      - main

env:
  ACR_NAME: ta306
  IMAGE_NAME: finalysis-app
  AZURE_WEBAPP_NAME: finalysis-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────
      # 1. Checkout source code
      # ─────────────────────────────
      - name: Checkout Source
        uses: actions/checkout@v4

      # ─────────────────────────────
      # 2. Login to Azure
      # ─────────────────────────────
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ─────────────────────────────
      # 3. Login to Azure Container Registry
      # ─────────────────────────────
      - name: Login to ACR
        run: |
          docker login ${{ env.ACR_NAME }}.azurecr.io \
            -u ${{ secrets.ACR_USERNAME }} \
            -p ${{ secrets.ACR_PASSWORD }}

      # ─────────────────────────────
      # 4. Build Docker Image (PAKAI DOCKER PRODUCTION)
      # ─────────────────────────────
      - name: Build Docker Image
        run: |
          docker build \
            -f docker/Dockerfile \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      # ─────────────────────────────
      # 5. Push Image to ACR
      # ─────────────────────────────
      - name: Push Docker Image
        run: |
          docker push \
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ─────────────────────────────
      # 6. Deploy to Azure Web App
      # ─────────────────────────────
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          images: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}