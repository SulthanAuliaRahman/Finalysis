  name: Build and Deploy to Azure

  on:
    push:
      branches:
        - main

  env:
    ACR_NAME: ta306
    IMAGE_NAME: finalysis-app
    AZURE_WEBAPP_NAME: finalysis-app

  jobs:
    build-and-deploy:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout Source
          uses: actions/checkout@v4

        - name: Login to Azure
          uses: azure/login@v2
          with:
            creds: ${{ secrets.AZURE_CREDENTIALS }}

        - name: Login to Azure Container Registry
          run: |
            docker login ${{ env.ACR_NAME }}.azurecr.io \
              -u ${{ secrets.ACR_USERNAME }} \
              -p ${{ secrets.ACR_PASSWORD }}

        - name: Build Docker Image
          run: |
            docker build \
              -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} .

        - name: Push Docker Image
          run: |
            docker push \
              ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

        - name: Deploy to Azure Web App
          uses: azure/webapps-deploy@v3
          with:
            app-name: ${{ env.AZURE_WEBAPP_NAME }}
            images: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}