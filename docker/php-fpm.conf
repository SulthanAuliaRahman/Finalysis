[www]
user = www-data
group = www-data

; PHP-FPM listen di TCP (bukan unix socket, lebih mudah untuk Nginx di container)
listen = 127.0.0.1:9000

; Process manager — dynamic untuk hemat resource di Azure Student
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

; Timeout sesuai Python service timeout (600 detik)
request_terminate_timeout = 600

; Log errors
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /dev/stderr

; Opcache sudah di-enable via opcache.ini
